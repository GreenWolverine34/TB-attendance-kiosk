name: Build and Release
on:
  push:
    tags:
      - 'v*' # Triggers whenever you push a version tag like v1.0.0

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React and Electron
        run: |
          npm run build
          npx electron-builder --linux --arm64 --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Automatically allowed by GitHub